<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖼️ FTP 이미지 업로더</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- 로그인 화면 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <div class="login-header">
                <h1>🔐 로그인</h1>
                <p>이미지 업로더에 접속하려면 로그인하세요</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">사용자 이름</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <div class="login-error" id="loginError" style="display: none;"></div>
                <button type="submit" class="login-btn">로그인</button>
            </form>
        </div>
    </div>

    <!-- 메인 업로더 화면 -->
    <div class="main-container" id="mainContainer" style="display: none;">
        <div class="container">
            <div class="header">
                <h1>🖼️ 이미지 업로더</h1>
                <p>FTP 서버에 안전하게 이미지를 업로드하세요</p>
                <button class="logout-btn" id="logoutBtn">로그아웃</button>
            </div>
            
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <p class="upload-text">이미지를 여기에 드래그하거나 클릭하세요</p>
                    <p class="upload-hint">JPEG, PNG, GIF, WebP 지원 (최대 10MB)</p>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;">
                </div>

                <div class="options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="optimizeCheck" checked>
                        <span>이미지 자동 최적화 (1200px, 85% 품질)</span>
                    </label>
                    <label class="checkbox-label checkbox-ad">
                        <input type="checkbox" id="adCheck">
                        <span>광고 이미지 저장 <em class="folder-badge">→ /ad/</em></span>
                    </label>
                    <label class="checkbox-label checkbox-limit">
                        <input type="checkbox" id="limitCheck" checked>
                        <span>업로드 용량 제한 <em class="limit-badge" id="limitBadge">10MB</em></span>
                    </label>
                </div>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>업로드 중입니다...</p>
            </div>

            <div class="error" id="error" style="display: none;"></div>

            <div class="results" id="results" style="display: none;">
                <h3>✅ 업로드 완료</h3>
                <div id="resultsList"></div>
            </div>
        </div>

        <footer class="footer">
            <p>🔒 모든 업로드는 암호화된 연결을 통해 안전하게 처리됩니다</p>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
